<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <div class="header">
            <div class="logo">🛡️ DetectoAI</div>
            <div class="subtitle">Real-time Threat Intelligence</div>
        </div>

        <div class="status-card">
            <div class="status-info">
                <div class="label">Protection Status</div>
                <div id="status-text" class="status-active">SHIELD ACTIVE</div>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggle-shield" checked>
                <span class="slider round"></span>
            </label>
        </div>

        <div class="feature-list">
            <div class="feature-item">
                <span class="dot primary"></span>
                <span>WhatsApp Monitoring</span>
            </div>
            <div class="feature-item">
                <span class="dot secondary"></span>
                <span>Gmail Inbox Scan</span>
            </div>
            <div class="feature-item">
                <span class="dot info"></span>
                <span>Selection Scanning</span>
            </div>
            <div class="feature-item">
                <span class="dot danger"></span>
                <span>AI-Assisted Forensics</span>
            </div>
        </div>

        <div class="footer">
            <a href="http://localhost:3000/dashboard" target="_blank">View Analytics Dashboard</a>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
